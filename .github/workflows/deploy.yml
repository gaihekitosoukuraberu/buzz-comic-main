name: Deploy to Xserver

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.XSERVER_SSH_KEY }}" > ~/.ssh/xserver_deploy
          chmod 600 ~/.ssh/xserver_deploy
          ssh-keyscan -p 10022 sv16424.xserver.jp >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Transfer build artifacts via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -p 10022 -i ~/.ssh/xserver_deploy -o StrictHostKeyChecking=no" \
            .next/standalone/ \
            xs997058@sv16424.xserver.jp:/home/xs997058/buzz-comic/
          rsync -avz \
            -e "ssh -p 10022 -i ~/.ssh/xserver_deploy -o StrictHostKeyChecking=no" \
            .next/static/ \
            xs997058@sv16424.xserver.jp:/home/xs997058/buzz-comic/.next/static/
          rsync -avz \
            -e "ssh -p 10022 -i ~/.ssh/xserver_deploy -o StrictHostKeyChecking=no" \
            public/ \
            xs997058@sv16424.xserver.jp:/home/xs997058/buzz-comic/public/

      - name: Run DB migrations & restart PM2
        run: |
          ssh -p 10022 -i ~/.ssh/xserver_deploy \
            -o StrictHostKeyChecking=no \
            xs997058@sv16424.xserver.jp \
            "cd /home/xs997058/buzz-comic && \
             export $(cat .env | xargs) && \
             npx prisma migrate deploy && \
             pm2 restart buzz-comic || pm2 start server.js --name buzz-comic"
